name: Build APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx2G -Dfile.encoding=UTF-8 -Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          echo y | $SDKMANAGER "ndk;27.0.12077973" > /dev/null 2>&1 || \
          echo y | $SDKMANAGER "ndk;26.1.10909125" > /dev/null 2>&1 || \
          echo y | $SDKMANAGER --install "ndk;25.2.9519653" > /dev/null
          NDK_DIR=$(ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null | sort -V | tail -1)
          if [ -n "$NDK_DIR" ]; then
            echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_DIR" >> $GITHUB_ENV
            echo "Using NDK: $NDK_DIR"
          else
            echo "ERROR: No NDK installed"
            exit 1
          fi

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build Rust native library
        run: |
          cargo ndk -t arm64-v8a --platform 24 -o app/src/main/jniLibs build --release
          cargo ndk -t armeabi-v7a --platform 21 -o app/src/main/jniLibs build --release

      - name: Build debug APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/*/debug/*.apk
